<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Mapatges (Modular)</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/lucide.min.js"></script>
    <style>
        .editor-container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .mapping-table-container { margin-top: 2rem; max-height: 600px; overflow-y: auto; border-radius: 0.75rem; border: 1px solid var(--glass-border); }
    </style>
</head>
<body>
    <div class="editor-container">
        <header class="editor-header">
            <a href="index.html" class="back-link"><i data-lucide="arrow-left" style="width: 18px;"></i> Tornar al Dashboard</a>
            <h1 style="margin-top: 1rem;">Gestor de Mapatge SAC</h1>
            <p class="subtitle">Gestiona la correspondència entre Open Data i els codis SAC</p>
        </header>

        <section class="controls glass">
            <div class="search-box">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="mappingSearch" placeholder="Cerca...">
            </div>
            <div style="display: flex; align-items: center; gap: 1rem; margin-left: auto;">
                <button onclick="resetToFile()" class="btn-secondary">Restablir</button>
                <span id="mappingCount" style="font-size: 0.9rem; color: var(--text-muted);">Carregant...</span>
            </div>
        </section>

        <div class="mapping-table-container glass">
            <table>
                <thead>
                    <tr>
                        <th>Codi SAC</th>
                        <th>Entitat</th>
                        <th>Membre / Càrrec</th>
                        <th style="width: 100px;">Accions</th>
                    </tr>
                </thead>
                <tbody id="mappingTableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal d'Edició -->
    <div id="editModal" class="modal-overlay" style="display: none;">
        <div class="modal-content glass" style="max-width: 600px;">
            <h2>Editar Mapatge</h2>
            <form id="editForm" style="display: flex; flex-direction: column; gap: 1rem; text-align: left;">
                <input type="hidden" id="editMappingIndex">
                <div class="form-group"><label>Entitat</label><input type="text" id="fieldEntitat" readonly class="input-readonly"></div>
                <div class="form-group"><label>Membre</label><input type="text" id="fieldMembre" readonly class="input-readonly"></div>
                <div class="form-group"><label>Càrrec</label><input type="text" id="fieldCarrec" readonly class="input-readonly"></div>
                <div class="form-group"><label>Codi SAC</label><input type="text" id="fieldCodi" required></div>
                <div class="form-actions" style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <button type="button" id="btnCancelEdit" class="btn">Cancel·lar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/editor-ui.js"></script>
</body>
</html>
