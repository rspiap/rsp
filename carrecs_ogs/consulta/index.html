<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta Sector Públic (Modular)</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="js/lucide.min.js"></script>
    <script>
        window.onerror = function (msg, url, lineNo, columnNo, error) {
            const debugDiv = document.createElement('div');
            debugDiv.style.position = 'fixed'; debugDiv.style.bottom = '0'; debugDiv.style.left = '0';
            debugDiv.style.width = '100%'; debugDiv.style.background = '#ef4444'; debugDiv.style.color = 'white';
            debugDiv.style.padding = '1rem'; debugDiv.style.zIndex = '9999'; debugDiv.style.fontSize = '0.8rem';
            debugDiv.textContent = 'Error: ' + msg + ' (' + url + ':' + lineNo + ')';
            document.body.appendChild(debugDiv);
            return false;
        };
    </script>
</head>

<body>
    <div class="container">
        <header>
            <button id="themeToggle" class="theme-toggle" title="Canviar tema">
                <i data-lucide="sun" style="width: 20px; height: 20px;"></i>
            </button>
            <h1>Sector Públic - Generalitat de Catalunya</h1>
            <div style="display: flex; justify-content: space-between; align-items: flex-end; width: 100%;">
                <p class="subtitle">
                    Òrgans de Govern Superior
                </p>
                <div style="margin-top: 1rem;">
                    <button id="btnSync" class="btn">
                        <i data-lucide="refresh-cw" style="width: 16px; margin-right: 8px;"></i>
                        Actualitzar
                    </button>
                </div>
            </div>
        </header>

        <section class="controls glass">
            <div class="controls-row">
                <div class="search-box">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="globalSearch" placeholder="Cerca...">
                </div>
                <div class="filter-group">
                    <select id="filterDepartament">
                        <option value="">Tots els departaments</option>
                    </select>
                    <select id="filterStatus">
                        <option value="">Tots els Estats</option>
                        <option value="Validat">Validats</option>
                        <option value="Pendent">Pendents</option>
                        <option value="No aplica">No aplica</option>
                    </select>
                </div>
            </div>
            <div class="controls-row wrap">
                <button id="toggleSac" class="btn">Només amb codi SAC</button>
                <button id="toggleGovern" class="btn">Sense càrrec informat</button>
                <button id="toggleVacant" class="btn">Vacants</button>
                <div class="multiselect-container">
                    <button id="btnCategoritzacions" class="btn">Categorització</button>
                    <div id="dropdownCategoritzacions" class="multiselect-dropdown">
                        <div class="multiselect-list" id="listCategoritzacions">
                            <div style="padding: 1rem; text-align: center; color: var(--text-muted);">Carregant...</div>
                        </div>
                    </div>
                </div>
                <div class="multiselect-container">
                    <button id="btnNomenaments" class="btn">Tipus Nomenament</button>
                    <div id="dropdownNomenaments" class="multiselect-dropdown">
                        <div class="multiselect-list" id="listNomenaments">
                            <div style="padding: 1rem; text-align: center; color: var(--text-muted);">Carregant...</div>
                        </div>
                    </div>
                </div>
                <div style="flex: 1;"></div>
                <button id="btnExportCSV" class="btn btn-secondary">Exportar CSV</button>
                <button id="btnResetFilters" class="btn btn-secondary">Netejar Filtres</button>
            </div>
        </section>

        <main class="glass">
            <div id="recordCount"
                style="padding: 0.75rem 1rem; font-size: 0.8rem; color: var(--text-muted); border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 600;">
                Carregant registres...
            </div>
            <div class="data-table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th class="sortable-header" data-sort="codi_sac" style="width: 100px; text-align: center;">
                                SAC <i data-lucide="chevron-down" class="sort-icon"></i></th>
                            <th class="sortable-header" data-sort="carrec" style="width: 250px;">Càrrec <i
                                    data-lucide="chevron-down" class="sort-icon"></i></th>
                            <th class="sortable-header" data-sort="entitat" style="width: 280px;">Entitat <i
                                    data-lucide="chevron-down" class="sort-icon"></i></th>
                            <th class="sortable-header" data-sort="is_govern_superior" style="width: 250px;">Òrgan
                                Govern <i data-lucide="chevron-down" class="sort-icon"></i></th>
                            <th class="sortable-header" data-sort="persona_nom">Persona / Estat <i
                                    data-lucide="chevron-down" class="sort-icon"></i></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal de Sincronització -->
    <div id="syncModal" class="modal-overlay" style="display: none;">
        <div class="modal-content glass">
            <h2>Sincronitzant Dades</h2>
            <p id="syncStep">Iniciant procés...</p>
            <div class="progress-container">
                <div id="syncProgressBar" class="progress-bar" style="width: 0%;"></div>
            </div>
            <p id="syncDetail" style="font-size: 0.8rem; color: #94a3b8; margin-top: 1rem;">Això pot trigar un minut
                segons la teva connexió.</p>
        </div>
    </div>

    <script type="module" src="js/consulta.js"></script>
</body>

</html>
