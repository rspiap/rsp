<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Mapatge SAC - Sector Públic</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Llibreria d'icones local -->
    <script src="lucide.min.js"></script>
    <style>
        .editor-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        .mapping-table-container {
            margin-top: 2rem;
            max-height: 600px;
            overflow-y: auto;
            border-radius: 0.75rem;
            border: 1px solid var(--glass-border);
        }
        .edit-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            display: none;
        }
        .edit-card {
            width: 90%;
            max-width: 600px;
            padding: 2rem;
        }
        .status-tag {
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            display: inline-block;
        }
        .status-new { background: var(--primary); color: white; }
        .status-existing { background: var(--secondary); color: white; }
    </style>
</head>
<body>
    <div class="editor-container">
        <header class="editor-header">
            <div>
                <a href="index.html" class="back-link">
                    <i data-lucide="arrow-left" style="width: 18px;"></i>
                    Tornar al Dashboard
                </a>
                <h1 style="margin-top: 1rem;">Gestor de Mapatge SAC</h1>
                <p class="subtitle" style="text-align: left;">Gestiona la correspondència entre Open Data i els codis SAC</p>
            </div>
            <div style="display: flex; gap: 1rem;">
            </div>
        </header>

        <section class="controls glass">
            <div class="search-box">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="mappingSearch" placeholder="Cerca per entitat, membre o càrrec...">
            </div>
            <div style="display: flex; align-items: center; gap: 1rem; margin-left: auto;">
                <button onclick="editor.resetToFile()" class="btn-secondary" style="border-color: var(--error); color: var(--error); font-size: 0.8rem; padding: 0.4rem 0.8rem;">
                    <i data-lucide="rotate-ccw" style="width: 14px; margin-right: 4px;"></i>
                    Restablir a versió de fitxer
                </button>
                <span id="mappingCount" style="font-size: 0.9rem; color: var(--text-muted);">Carregant...</span>
            </div>
        </section>

        <div class="mapping-table-container glass">
            <table>
                <thead>
                    <tr>
                        <th>Codi SAC</th>
                        <th>Entitat / Denominació</th>
                        <th>Membre / Càrrec</th>
                        <th style="width: 100px;">Accions</th>
                    </tr>
                </thead>
                <tbody id="mappingTableBody">
                    <!-- Registres -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal d'Edició -->
    <div id="editModal" class="edit-overlay">
        <div class="edit-card glass">
            <h2 id="modalTitle">Editar Mapatge</h2>
            <div id="modalStatusTag" class="status-tag"></div>
            
            <form id="editForm" class="editor-form">
                <div class="form-group">
                    <label>Entitat (Denominació Open Data)</label>
                    <input type="text" id="fieldEntitat" readonly style="background: rgba(255,255,255,0.02); color: var(--text-muted); cursor: not-allowed;">
                </div>
                <div class="form-group">
                    <label>Membre (Tipus/Grup)</label>
                    <input type="text" id="fieldMembre" readonly style="background: rgba(255,255,255,0.02); color: var(--text-muted); cursor: not-allowed;">
                </div>
                <div class="form-group">
                    <label>Càrrec (Nom del lloc de treball)</label>
                    <input type="text" id="fieldCarrec" readonly style="background: rgba(255,255,255,0.02); color: var(--text-muted); cursor: not-allowed;">
                </div>
                <div class="form-group">
                    <label>Codi SAC (Codi d'informació)</label>
                    <input type="text" id="fieldCodi" placeholder="Ex: 12345" required autofocus>
                </div>
                
                <div class="form-actions">
                    <button type="button" id="btnCancelEdit" class="btn-secondary">Cancel·lar</button>
                    <button type="submit" class="btn btn-primary">Guardar Canvis en Memòria</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="sac_service.js"></script>
    <script src="sync.js"></script>
    <script src="editor.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
